<template>
    <!-- Modal backdrop -->
    <div class="rb-backdrop" onclick={handleClose}></div>

    <!-- Modal -->
    <section class="rb-modal slds-modal slds-fade-in-open" role="dialog" aria-modal="true" aria-labelledby="rb-modal-heading">
        <div class="slds-modal__container rb-modal__container">

            <!-- Header -->
            <header class="slds-modal__header">
                <lightning-button-icon
                    icon-name="utility:close"
                    alternative-text="Close"
                    title="Close"
                    variant="bare-inverse"
                    class="slds-modal__close"
                    onclick={handleClose}>
                </lightning-button-icon>
                <h1 id="rb-modal-heading" class="slds-modal__title">{modalTitle}</h1>
            </header>

            <!-- Body: two-column layout -->
            <div class="slds-modal__content rb-modal__body">
                <div class="slds-grid slds-gutters">

                    <!-- Left: Form -->
                    <div class="slds-col slds-size_7-of-12 rb-form">

                        <!-- STEP 1: Scope -->
                        <div class="rb-section">
                            <div class="rb-section__header">
                                <span class="rb-section__step">1</span>
                                <span class="rb-section__title">Scope — Where &amp; what does this segment apply to?</span>
                            </div>

                            <!-- Multi-select location picker -->
                            <div class="rb-field-label">
                                <span class="slds-form-element__label">Location(s)</span>
                                <span class="rb-field-hint">Select one or more locations</span>
                            </div>
                            <div class="rb-location-picker" onblur={handleLocationPickerBlur}>
                                <!-- Trigger button -->
                                <button
                                    type="button"
                                    class="rb-location-trigger"
                                    onclick={handleLocationTriggerClick}
                                    aria-haspopup="listbox"
                                    aria-expanded={isLocationPickerOpen}>
                                    <span class="rb-location-trigger__label">{locationSummaryLabel}</span>
                                    <lightning-icon icon-name="utility:chevrondown" size="x-small" alternative-text=""></lightning-icon>
                                </button>

                                <!-- Dropdown checklist -->
                                <template lwc:if={isLocationPickerOpen}>
                                    <div class="rb-location-dropdown" role="listbox" aria-multiselectable="true">
                                        <template for:each={locationCheckboxItems} for:item="loc">
                                            <label key={loc.value} class="rb-location-option">
                                                <input
                                                    type="checkbox"
                                                    checked={loc.checked}
                                                    data-value={loc.value}
                                                    onchange={handleLocationCheckboxChange}
                                                    class="rb-location-option__checkbox" />
                                                <span class="rb-location-option__label">{loc.label}</span>
                                            </label>
                                        </template>
                                    </div>
                                </template>

                                <!-- Selected pills -->
                                <template lwc:if={hasLocations}>
                                    <div class="rb-location-pills">
                                        <template for:each={selectedLocationPills} for:item="pill">
                                            <span key={pill.id} class="rb-pill">
                                                <span class="rb-pill__label">{pill.label}</span>
                                                <button
                                                    type="button"
                                                    class="rb-pill__remove"
                                                    data-id={pill.id}
                                                    onclick={handleRemoveLocation}
                                                    title="Remove">×</button>
                                            </span>
                                        </template>
                                    </div>
                                </template>
                            </div>

                            <!-- SKU Scope -->
                            <div class="rb-sku-scope">
                                <legend class="slds-form-element__legend slds-form-element__label rb-sku-scope__label">SKU Scope</legend>
                                <div class="rb-sku-scope__options">
                                    <label class="rb-radio-option">
                                        <input
                                            type="radio"
                                            name="skuScope"
                                            value="all"
                                            onchange={handleSkuScopeAll}
                                            class="rb-radio-option__input" />
                                        <span class="rb-radio-option__label">All SKUs</span>
                                    </label>
                                    <label class="rb-radio-option">
                                        <input
                                            type="radio"
                                            name="skuScope"
                                            value="specific"
                                            onchange={handleSkuScopeSpecific}
                                            class="rb-radio-option__input" />
                                        <span class="rb-radio-option__label">Specific SKU(s)</span>
                                    </label>
                                </div>
                                <template lwc:if={isSpecificSku}>
                                    <lightning-input
                                        type="text"
                                        label="SKU ID(s)"
                                        placeholder="e.g. SKU-001, SKU-002..."
                                        value={specificSku}
                                        onchange={handleSkuInputChange}
                                        class="rb-sku-input">
                                    </lightning-input>
                                </template>
                            </div>
                        </div>

                        <!-- STEP 2: Segment type -->
                        <div class="rb-section">
                            <div class="rb-section__header">
                                <span class="rb-section__step">2</span>
                                <span class="rb-section__title">Segment Type</span>
                            </div>

                            <div class="rb-rule-type">
                                <div class="rb-rule-type__options">
                                    <button
                                        class={percentageTabClass}
                                        onclick={handleRuleTypePercentage}
                                        type="button">
                                        Percentage (%)
                                    </button>
                                    <button
                                        class={maxQtyTabClass}
                                        onclick={handleRuleTypeMaxQty}
                                        type="button">
                                        Max Fixed Quantity
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- STEP 3: Group allocation rows -->
                        <div class="rb-section">
                            <div class="rb-section__header">
                                <span class="rb-section__step">3</span>
                                <span class="rb-section__title">Group Allocations</span>
                            </div>

                            <p class="rb-section__subtitle">Add one row per group. Each group gets its own allocation cap.</p>

                            <!-- Column headers -->
                            <div class="rb-group-grid rb-group-grid--header">
                                <span>Group</span>
                                <span>{groupRowValueHeader}</span>
                                <span>Priority</span>
                                <span></span>
                            </div>

                            <!-- Group rows -->
                            <template for:each={groupRowsWithMeta} for:item="row">
                                <div key={row.id} class="rb-group-grid rb-group-grid--row">
                                    <lightning-combobox
                                        label=""
                                        placeholder="Select group..."
                                        value={row.groupId}
                                        options={row.availableGroups}
                                        data-rowid={row.id}
                                        onchange={handleGroupChange}>
                                    </lightning-combobox>

                                    <lightning-input
                                        type="number"
                                        label=""
                                        placeholder={row.valuePlaceholder}
                                        value={row.value}
                                        min="1"
                                        data-rowid={row.id}
                                        onchange={handleGroupValueChange}>
                                    </lightning-input>

                                    <lightning-combobox
                                        label=""
                                        placeholder="1"
                                        value={row.priorityString}
                                        options={priorityOptions}
                                        data-rowid={row.id}
                                        onchange={handleGroupPriorityChange}>
                                    </lightning-combobox>

                                    <template lwc:if={row.canRemove}>
                                        <lightning-button-icon
                                            icon-name="utility:delete"
                                            variant="bare"
                                            size="small"
                                            alternative-text="Remove row"
                                            data-rowid={row.id}
                                            onclick={handleRemoveGroupRow}
                                            class="rb-group-row__delete">
                                        </lightning-button-icon>
                                    </template>
                                    <template lwc:else>
                                        <span class="rb-group-row__delete-placeholder"></span>
                                    </template>
                                </div>
                            </template>

                            <!-- Over-allocation warning -->
                            <template lwc:if={isOverAllocated}>
                                <p class="rb-error" role="alert">
                                    <lightning-icon icon-name="utility:error" size="x-small" alternative-text="Error"></lightning-icon>
                                    {overAllocatedMessage}
                                </p>
                            </template>

                            <!-- Add group row button -->
                            <template lwc:if={canAddGroupRow}>
                                <lightning-button
                                    label="Add Another Group"
                                    icon-name="utility:add"
                                    variant="neutral"
                                    onclick={handleAddGroupRow}
                                    class="rb-add-group-btn">
                                </lightning-button>
                            </template>
                        </div>

                        <!-- Multiple segments hint -->
                        <template lwc:if={willCreateMultiple}>
                            <div class="rb-multi-hint">
                                <lightning-icon icon-name="utility:info" size="x-small" alternative-text="Info"></lightning-icon>
                                <span>{multipleRulesHint}</span>
                            </div>
                        </template>

                    </div>

                    <!-- Right: Live Preview -->
                    <div class="slds-col slds-size_5-of-12">
                        <ui-allocation-preview
                            location-id={previewLocationId}
                            existing-rules={existingRulesForLocation}
                            draft-rules={draftRules}>
                        </ui-allocation-preview>

                        <template lwc:if={willCreateMultiple}>
                            <div class="rb-preview-note rb-preview-note--multi slds-m-top_small">
                                <lightning-icon icon-name="utility:layers" size="x-small" alternative-text=""></lightning-icon>
                                <span>Preview shows one location. The same allocation will apply to all selected locations.</span>
                            </div>
                        </template>

                        <div class="rb-preview-note slds-m-top_small">
                            <lightning-icon icon-name="utility:info" size="x-small" alternative-text="Info"></lightning-icon>
                            <span>Group caps limit how much of a location's on-hand a group can consume. Locations (including BOPIS) always retain 100% access to their own inventory.</span>
                        </div>
                    </div>

                </div>
            </div>

            <!-- Footer -->
            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" variant="neutral" onclick={handleClose}></lightning-button>
                <lightning-button label={saveLabel} variant="brand" onclick={handleSave} disabled={isSaveDisabled}></lightning-button>
            </footer>

        </div>
    </section>
</template>
