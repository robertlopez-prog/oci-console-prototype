<template>
    <div class="oci-page">

        <!-- ── Page Header ── -->
        <div class="slds-page-header oci-page__header">
            <div class="slds-page-header__row">
                <div class="slds-page-header__col-title">
                    <div class="slds-media slds-media_center">
                        <div class="slds-media__figure">
                            <lightning-icon icon-name="standard:product" size="medium" alternative-text="Omnichannel Inventory"></lightning-icon>
                        </div>
                        <div class="slds-media__body">
                            <p class="slds-text-title oci-page__eyebrow">Omnichannel Inventory</p>
                            <h1 class="slds-page-header__title">Find and modify product inventory and availability for your store.</h1>
                        </div>
                    </div>
                </div>
                <div class="slds-page-header__col-actions oci-header-actions">
                    <lightning-button-group>
                        <lightning-button label="Add Inventory" variant="neutral" onclick={handleAddInventory}></lightning-button>
                        <lightning-button label="Import Inventory" variant="neutral" onclick={handleImport}></lightning-button>
                        <lightning-button-menu
                            alternative-text="More actions"
                            variant="border"
                            icon-name="utility:down"
                            menu-alignment="right"
                            onselect={handleOverflowSelect}>
                            <lightning-menu-item
                                value="delete-inventory"
                                label="Delete Inventory"
                                prefix-icon-name="utility:delete">
                            </lightning-menu-item>
                            <lightning-menu-divider></lightning-menu-divider>
                            <lightning-menu-item
                                value="import-history"
                                label="Import History"
                                prefix-icon-name="utility:upload">
                            </lightning-menu-item>
                            <lightning-menu-item
                                value="deletion-history"
                                label="Delete History"
                                prefix-icon-name="utility:clock">
                            </lightning-menu-item>
                        </lightning-button-menu>
                    </lightning-button-group>
                </div>
            </div>
        </div>

        <!-- ── Tab Bar ── -->
        <div class="oci-tabs">
            <div class="oci-tabs__bar">
                <button
                    class={inventoryLookupTabClass}
                    onclick={handleTabInventory}>
                    Inventory Records
                </button>
                <button
                    class={segmentationTabClass}
                    onclick={handleTabSegmentation}>
                    Segmentation
                </button>
                <button
                    class={locationMgmtTabClass}
                    onclick={handleTabLocations}>
                    Location Management
                </button>
                <button
                    class={overviewTabClass}
                    onclick={handleTabOverview}>
                    Omnichannel Overview
                </button>
            </div>
        </div>

        <!-- ── Tab Content ── -->
        <div class="oci-tab-content">

            <!-- INVENTORY LOOKUP TAB -->
            <template lwc:if={isInventoryLookupActive}>
                <div class="oci-lookup">
                    <!-- Search Bar -->
                    <div class="oci-lookup__search slds-grid slds-gutters_small slds-grid_vertical-align-end">
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-input
                                type="text"
                                label="SKU"
                                placeholder="Enter SKU..."
                                value={searchSku}
                                onchange={handleSkuChange}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-combobox
                                label="Location Group"
                                placeholder="Select..."
                                value={selectedLocationGroup}
                                options={locationGroupOptions}
                                onchange={handleLocationGroupChange}>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_2-of-12">
                            <lightning-button label="Get Inventory Data" variant="brand" onclick={handleGetInventoryData}></lightning-button>
                        </div>
                    </div>

                    <!-- Results or Empty State -->
                    <template lwc:if={hasInventoryResults}>
                        <!-- Group-level summary -->
                        <div class="oci-lookup__group-header slds-grid slds-grid_vertical-align-center">
                            <div class="slds-col">
                                <span class="slds-text-title_caps oci-lookup__group-label">Location Group</span>
                            </div>
                            <div class="slds-col slds-text-align_right">
                                <span class="slds-text-body_small slds-text-color_weak">Unknown Product (SKU: {searchSku})</span>
                            </div>
                        </div>
                        <lightning-datatable
                            key-field="id"
                            data={groupSummaryRows}
                            columns={groupColumns}
                            hide-checkbox-column
                            class="oci-lookup__group-table">
                        </lightning-datatable>

                        <!-- Location breakdown -->
                        <div class="oci-lookup__locations-header">
                            <span class="slds-text-title_caps">Locations ({inventoryResults.length})</span>
                        </div>
                        <lightning-datatable
                            key-field="id"
                            data={inventoryResults}
                            columns={locationColumns}
                            hide-checkbox-column
                            class="oci-lookup__locations-table">
                        </lightning-datatable>
                    </template>

                    <template lwc:else>
                        <div class="oci-lookup__empty">
                            <div class="oci-lookup__empty-illustration" aria-hidden="true">
                                <lightning-icon icon-name="utility:search" size="large" alternative-text=""></lightning-icon>
                            </div>
                            <p class="oci-lookup__empty-text">To find inventory data, look up a SKU.</p>
                            <p class="oci-lookup__empty-subtext">Enter a SKU and location group.</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- LOCATION MANAGEMENT TAB -->
            <template lwc:if={isLocationMgmtActive}>
                <div class="oci-location-mgmt slds-grid slds-gutters">
                    <div class="slds-col slds-size_8-of-12">
                        <!-- Location Groups list -->
                        <lightning-card title="All Location Groups" icon-name="standard:groups">
                            <div slot="actions">
                                <lightning-button label="New" variant="neutral" size="small"></lightning-button>
                            </div>
                            <div class="slds-p-around_small">
                                <lightning-datatable
                                    key-field="id"
                                    data={locationGroups}
                                    columns={locationGroupColumns}
                                    hide-checkbox-column>
                                </lightning-datatable>
                            </div>
                        </lightning-card>

                        <!-- Locations list -->
                        <lightning-card title="All Locations" icon-name="standard:location" class="slds-m-top_medium">
                            <div slot="actions">
                                <lightning-button label="New" variant="neutral" size="small"></lightning-button>
                            </div>
                            <div class="slds-p-around_small">
                                <lightning-datatable
                                    key-field="id"
                                    data={locations}
                                    columns={locationColumns2}
                                    hide-checkbox-column>
                                </lightning-datatable>
                            </div>
                        </lightning-card>
                    </div>

                    <!-- Right panel: Last commit status -->
                    <div class="slds-col slds-size_4-of-12">
                        <lightning-card title="Location Management Changes" icon-name="utility:sync">
                            <div class="slds-p-around_medium">
                                <p class="slds-text-body_small slds-text-color_weak">Location to OCI</p>
                                <p class="slds-text-body_regular slds-m-top_x-small">Last commit completed 4/14/2026, 12:17 PM MDT</p>
                                <div class="slds-m-top_medium">
                                    <lightning-button label="Sync" variant="brand" class="slds-m-right_x-small"></lightning-button>
                                    <lightning-button label="View All" variant="neutral"></lightning-button>
                                </div>
                            </div>
                        </lightning-card>
                    </div>
                </div>
            </template>

            <!-- SEGMENTATION TAB -->
            <template lwc:if={isSegmentationRulesActive}>
                <div class="seg-rules">

                    <!-- Toolbar: Pending banner -->
                    <template lwc:if={hasPendingChanges}>
                        <div class="seg-rules__pending-banner" role="status">
                            <lightning-icon icon-name="utility:clock" size="x-small" alternative-text="Pending"></lightning-icon>
                            <span>You have unsaved segment changes. <strong>Trigger a rebalance</strong> to apply them to live inventory.</span>
                            <lightning-button
                                label={rebalanceLabel}
                                variant="brand"
                                size="small"
                                onclick={handleOpenRebalanceModal}
                                disabled={isRebalancing}
                                class="seg-rules__rebalance-btn">
                            </lightning-button>
                        </div>
                    </template>

                    <!-- Rules header row -->
                    <div class="seg-rules__header">
                        <div class="seg-rules__header-left">
                            <span class="seg-rules__count">{segFilteredCountLabel}</span>
                            <template lwc:if={segAtLimit}>
                                <span class="seg-rules__limit-badge">Segment limit reached (500). Use Import to add more.</span>
                            </template>
                        </div>
                        <div class="seg-rules__header-actions">
                            <lightning-button
                                label="Import Segments"
                                icon-name="utility:upload"
                                variant="neutral"
                                onclick={handleSegImport}>
                            </lightning-button>
                            <lightning-button
                                label="Export All"
                                icon-name="utility:download"
                                variant="neutral"
                                onclick={handleSegExport}>
                            </lightning-button>
                            <lightning-button
                                label="Rebalance"
                                icon-name="utility:refresh"
                                variant="neutral"
                                title="Reset segment counts for all or targeted locations/SKUs"
                                onclick={handleOpenRebalanceModal}
                                disabled={isRebalancing}>
                            </lightning-button>
                            <lightning-button
                                label="New Segment"
                                icon-name="utility:add"
                                variant="brand"
                                disabled={segNewRuleDisabled}
                                title={segNewRuleTitle}
                                onclick={handleSegNewRule}>
                            </lightning-button>
                        </div>
                    </div>

                    <!-- Search + Filters -->
                    <div class="seg-rules__filters slds-grid slds-gutters_small slds-grid_vertical-align-end">
                        <div class="slds-col slds-size_4-of-12">
                            <lightning-input
                                type="search"
                                label="Search segments"
                                placeholder="Search by group, location, SKU..."
                                value={segSearch}
                                onchange={handleSegSearch}>
                            </lightning-input>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-combobox
                                label="Group"
                                value={segFilterGroup}
                                options={segGroupFilterOptions}
                                onchange={handleSegFilterGroup}>
                            </lightning-combobox>
                        </div>
                        <div class="slds-col slds-size_3-of-12">
                            <lightning-combobox
                                label="Segment Type"
                                value={segFilterType}
                                options={segTypeFilterOptions}
                                onchange={handleSegFilterType}>
                            </lightning-combobox>
                        </div>
                    </div>

                    <!-- Rules table -->
                    <div class="seg-rules__table-wrap">
                        <table class="seg-rules__table" role="grid">
                            <thead>
                                <tr>
                                    <th scope="col">Group</th>
                                    <th scope="col">Location(s)</th>
                                    <th scope="col">SKU Scope</th>
                                    <th scope="col">Type</th>
                                    <th scope="col">Value</th>
                                    <th scope="col">Priority</th>
                                    <th scope="col">Status</th>
                                    <th scope="col">Last Rebalanced</th>
                                    <th scope="col">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={segRuleRows} for:item="row">
                                    <tr key={row.id}>
                                        <td>
                                            <span class="seg-rules__group-name">{row.groupLabel}</span>
                                        </td>
                                        <td>{row.locationLabel}</td>
                                        <td>{row.skuLabel}</td>
                                        <td>{row.ruleTypeLabel}</td>
                                        <td class="seg-rules__value-cell">{row.displayValue}</td>
                                        <td class="seg-rules__priority-cell">{row.priority}</td>
                                        <td>
                                            <span class={row.statusBadgeClass}>{row.status}</span>
                                        </td>
                                        <td class="seg-rules__date-cell">
                                            <template lwc:if={row.lastRebalanced}>
                                                {row.lastRebalanced}
                                            </template>
                                            <template lwc:else>
                                                <span class="seg-rules__never">—</span>
                                            </template>
                                        </td>
                                        <td class="seg-rules__actions-cell">
                                            <lightning-button-icon
                                                icon-name="utility:edit"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Edit segment"
                                                title="Edit"
                                                data-id={row.id}
                                                onclick={handleSegEditRule}>
                                            </lightning-button-icon>
                                            <!-- Row-level rebalance with micro-confirm -->
                                            <div class="seg-rules__row-rebalance-wrap">
                                                <lightning-button-icon
                                                    icon-name="utility:refresh"
                                                    variant="border-filled"
                                                    size="small"
                                                    alternative-text="Rebalance this segment"
                                                    title="Rebalance"
                                                    data-id={row.id}
                                                    data-group={row.groupLabel}
                                                    data-location={row.locationLabel}
                                                    data-sku={row.skuLabel}
                                                    onclick={handleRowRebalanceClick}>
                                                </lightning-button-icon>
                                                <!-- Micro-confirm popover -->
                                                <template lwc:if={row.showConfirm}>
                                                    <div class="seg-rules__row-confirm" role="dialog">
                                                        <p class="seg-rules__row-confirm-text">Rebalance <strong>{row.groupLabel}</strong> / {row.locationLabel} / {row.skuLabel}?</p>
                                                        <div class="seg-rules__row-confirm-actions">
                                                            <lightning-button
                                                                label="Confirm"
                                                                variant="brand"
                                                                size="small"
                                                                data-id={row.id}
                                                                onclick={handleRowRebalanceConfirm}>
                                                            </lightning-button>
                                                            <lightning-button
                                                                label="Cancel"
                                                                variant="neutral"
                                                                size="small"
                                                                data-id={row.id}
                                                                onclick={handleRowRebalanceCancel}>
                                                            </lightning-button>
                                                        </div>
                                                    </div>
                                                </template>
                                            </div>
                                            <lightning-button-icon
                                                icon-name="utility:delete"
                                                variant="border-filled"
                                                size="small"
                                                alternative-text="Delete segment"
                                                title="Delete"
                                                data-id={row.id}
                                                onclick={handleSegDeleteRule}
                                                class="seg-rules__delete-btn">
                                            </lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>

                        <!-- Empty state -->
                        <template lwc:if={segRuleRows.length}>
                        </template>
                        <template lwc:else>
                            <div class="seg-rules__empty">
                                <lightning-icon icon-name="utility:filter" size="large" alternative-text="" class="seg-rules__empty-icon"></lightning-icon>
                                <p class="seg-rules__empty-text">No segments match your search.</p>
                                <p class="seg-rules__empty-sub">Try clearing your filters or create a new segment.</p>
                            </div>
                        </template>
                    </div>

                    <!-- Pagination -->
                    <template lwc:if={segShowPaging}>
                        <div class="seg-rules__pagination">
                            <lightning-button-icon
                                icon-name="utility:chevronleft"
                                variant="border-filled"
                                size="small"
                                alternative-text="Previous page"
                                disabled={segPrevDisabled}
                                onclick={handleSegPrevPage}>
                            </lightning-button-icon>
                            <span class="seg-rules__page-label">Page {segCurrentPage} of {segTotalPages}</span>
                            <lightning-button-icon
                                icon-name="utility:chevronright"
                                variant="border-filled"
                                size="small"
                                alternative-text="Next page"
                                disabled={segNextDisabled}
                                onclick={handleSegNextPage}>
                            </lightning-button-icon>
                        </div>
                    </template>

                    <!-- Last rebalanced footer -->
                    <div class="seg-rules__footer">
                        <lightning-icon icon-name="utility:refresh" size="x-small" alternative-text=""></lightning-icon>
                        <span>Last rebalanced: {lastRebalanced}</span>
                        <template lwc:if={isRebalancing}>
                            <ui-spinner size="x-small"></ui-spinner>
                            <span class="seg-rules__rebalancing-label">Rebalancing…</span>
                        </template>
                    </div>

                </div>
            </template>

            <!-- OMNICHANNEL OVERVIEW TAB -->
            <template lwc:if={isOverviewActive}>
                <page-omnichannel-overview embedded></page-omnichannel-overview>
            </template>

        </div>
    </div>

    <!-- ── Rebalance Modal ── -->
    <template lwc:if={isRebalanceModalOpen}>
        <div class="rb-backdrop" onclick={handleRebalanceModalClose}></div>
        <section class="rb-modal slds-modal slds-fade-in-open" role="dialog" aria-modal="true" aria-labelledby="reb-modal-heading">
            <div class="slds-modal__container reb-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        title="Close"
                        variant="bare-inverse"
                        class="slds-modal__close"
                        onclick={handleRebalanceModalClose}>
                    </lightning-button-icon>
                    <h1 id="reb-modal-heading" class="slds-modal__title">Trigger Rebalance</h1>
                </header>

                <div class="slds-modal__content reb-modal__body">

                    <!-- Scope selector -->
                    <p class="reb-section-label">Rebalance Scope</p>

                    <div class="reb-scope-options">
                        <!-- All Segments -->
                        <label class="reb-scope-card">
                            <input type="radio" name="rebScope" value="all" checked={rebScopeIsAll} onchange={handleRebScopeChange} class="reb-scope-card__radio" />
                            <div class="reb-scope-card__body">
                                <span class="reb-scope-card__title">All Segments</span>
                                <span class="reb-scope-card__desc">Recalculates availability for all active segments across all locations. Use after a full import or broad stock event.</span>
                            </div>
                        </label>

                        <!-- Location / SKU -->
                        <label class="reb-scope-card">
                            <input type="radio" name="rebScope" value="location" checked={rebScopeIsLocation} onchange={handleRebScopeChange} class="reb-scope-card__radio" />
                            <div class="reb-scope-card__body">
                                <span class="reb-scope-card__title">Specific Location / SKU</span>
                                <span class="reb-scope-card__desc">Target one location and optionally a single SKU. Use after localized damage, shrinkage, or a count correction.</span>
                            </div>
                        </label>

                        <!-- Group -->
                        <label class="reb-scope-card">
                            <input type="radio" name="rebScope" value="group" checked={rebScopeIsGroup} onchange={handleRebScopeChange} class="reb-scope-card__radio" />
                            <div class="reb-scope-card__body">
                                <span class="reb-scope-card__title">Specific Group</span>
                                <span class="reb-scope-card__desc">Rebalance all rules for one channel group. Use when a single channel's allocation has drifted or needs correction.</span>
                            </div>
                        </label>
                    </div>

                    <!-- Location/SKU sub-fields -->
                    <template lwc:if={rebScopeIsLocation}>
                        <div class="reb-subfields">
                            <lightning-combobox
                                label="Location"
                                placeholder="Select location..."
                                value={rebLocation}
                                options={rebLocationOptions}
                                onchange={handleRebLocationChange}
                                required>
                            </lightning-combobox>
                            <div class="reb-sku-scope">
                                <legend class="reb-sku-scope__label">SKU</legend>
                                <div class="reb-sku-scope__options">
                                    <label class="rb-radio-option">
                                        <input type="radio" name="rebSkuScope" value="all" onchange={handleRebSkuScopeChange} class="rb-radio-option__input" checked={rebSkuScopeIsAll} />
                                        <span class="rb-radio-option__label">All SKUs at this location</span>
                                    </label>
                                    <label class="rb-radio-option">
                                        <input type="radio" name="rebSkuScope" value="specific" onchange={handleRebSkuScopeChange} class="rb-radio-option__input" checked={rebSkuScopeIsSpecific} />
                                        <span class="rb-radio-option__label">Specific SKU</span>
                                    </label>
                                </div>
                                <template lwc:if={rebSkuScopeIsSpecific}>
                                    <lightning-input
                                        type="text"
                                        label="SKU"
                                        placeholder="e.g. RED-SHIRT-XL"
                                        value={rebSku}
                                        onchange={handleRebSkuChange}>
                                    </lightning-input>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Group sub-field -->
                    <template lwc:if={rebScopeIsGroup}>
                        <div class="reb-subfields">
                            <lightning-combobox
                                label="Group"
                                placeholder="Select group..."
                                value={rebGroup}
                                options={rebGroupOptions}
                                onchange={handleRebGroupChange}
                                required>
                            </lightning-combobox>
                        </div>
                    </template>

                    <!-- Info note -->
                    <div class="reb-info-note">
                        <lightning-icon icon-name="utility:info" size="x-small" alternative-text="Info"></lightning-icon>
                        <span>A rebalance resets consumption counts and recalculates available inventory from current on-hand and open reservations. Segment setting is not changed.</span>
                    </div>

                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" variant="neutral" onclick={handleRebalanceModalClose}></lightning-button>
                    <lightning-button label={rebalanceModalSubmitLabel} variant="brand" onclick={handleRebalanceModalSubmit} disabled={isRebalancing}></lightning-button>
                </footer>
            </div>
        </section>
    </template>

    <!-- ── Rule Builder Modal ── -->
    <template lwc:if={isRuleBuilderOpen}>
        <ui-segmentation-rule-builder
            edit-rule={editingRule}
            total-rule-count={segTotalRuleCount}
            onclose={handleRuleBuilderClose}
            onsave={handleRuleBuilderSave}>
        </ui-segmentation-rule-builder>
    </template>

    <!-- ── Delete Inventory Modal (rendered conditionally) ── -->
    <template lwc:if={isDeleteModalOpen}>
        <ui-delete-inventory-modal
            onclose={handleModalClose}
            onsubmit={handleModalSubmit}>
        </ui-delete-inventory-modal>
    </template>

    <!-- ── Toast notification ── -->
    <template lwc:if={showToast}>
        <div class="oci-toast">
            <div class={toastClass} role="status">
                <span class="slds-assistive-text">{toastVariant}</span>
                <lightning-icon icon-name={toastIcon} variant="inverse" size="small" class="slds-m-right_small" alternative-text=""></lightning-icon>
                <div class="slds-notify__content">
                    <h2 class="slds-text-heading_small slds-text-color_inverse">{toastTitle}</h2>
                    <p class="slds-text-color_inverse-weak">{toastMessage}</p>
                </div>
                <div class="slds-notify__close">
                    <lightning-button-icon
                        icon-name="utility:close"
                        variant="bare-inverse"
                        alternative-text="Close"
                        onclick={handleToastClose}>
                    </lightning-button-icon>
                </div>
            </div>
        </div>
    </template>

</template>
